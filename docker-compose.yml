# Full self-host stack: edge (web + TLS + API proxy), API control plane, Redis.
# Configure domains and secrets in .env (see .env.example). One command: docker compose up -d.
services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      # Caddy keeps stable container listeners; only the host-facing ports change.
      - "${WEB_HOST_PORT:-80}:80"
      - "${API_HOST_PORT:-4000}:4000"
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_PATH: /data/cloud-code.sqlite
    volumes:
      # The control plane holds NO Docker socket. All sandboxes/codespaces run on users' agents
      # (their VPS), reached only over the outbound agent tunnel.
      - api_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  api_data:
  redis_data:
