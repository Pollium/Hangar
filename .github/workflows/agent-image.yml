name: Agent image

# Builds and publishes the compute-agent image to GitHub Container Registry. Users' VPSes pull
# this via the "Connect a VPS" install command. Uses the built-in GITHUB_TOKEN — no PAT needed.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'packages/agent/**'
      - 'packages/contracts/**'
      - 'docker/agent.Dockerfile'
      - '.github/workflows/agent-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # <owner>/<repo>-agent, lowercased by the action. Rename the repo → image follows.
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
